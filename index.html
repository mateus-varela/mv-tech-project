<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MV Tech — Gerenciador de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Login page override: dark glassmorphism ── */
    .login-wrapper {
      overflow: hidden;
    }

    /* Orbs animados no fundo */
    .login-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: orb-float 8s ease-in-out infinite;
    }
    .login-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.35) 0%, transparent 70%);
      top: -150px; right: -100px;
      animation-delay: 0s;
    }
    .login-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, transparent 70%);
      bottom: -100px; left: -80px;
      animation-delay: -3s;
    }
    .login-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
      top: 40%; left: 20%;
      animation-delay: -5s;
    }
    @keyframes orb-float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* Card glassmorphism escuro */
    .login-card {
      background: rgba(15, 12, 50, 0.72) !important;
      backdrop-filter: blur(24px) saturate(1.4) !important;
      -webkit-backdrop-filter: blur(24px) saturate(1.4) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06) !important;
    }

    /* Logo */
    .login-logo {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 45%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .login-logo .logo-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #ffffff;
      border-radius: 50%;
      border: 1.5px solid rgba(165,180,252,0.6);
      box-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 24px rgba(165,180,252,0.5);
      margin: 0 2px;
      flex-shrink: 0;
      -webkit-text-fill-color: initial;
      position: relative;
      bottom: 2px;
    }

    .login-subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    /* Tabs dark */
    .login-card .nav-tabs {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .login-card .nav-tabs .nav-link {
      color: rgba(255,255,255,0.38);
      font-weight: 600;
      font-size: 14px;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 9px 20px;
      transition: color 0.15s;
    }
    .login-card .nav-tabs .nav-link:hover {
      color: rgba(255,255,255,0.65);
    }
    .login-card .nav-tabs .nav-link.active {
      color: #ffffff;
      background: transparent;
      border-bottom-color: #6366f1;
    }

    /* Form labels */
    .login-card .form-label {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    /* Form inputs dark */
    .login-card .form-control {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
      border-radius: 10px;
      padding: 12px 15px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .login-card .form-control::placeholder {
      color: rgba(255,255,255,0.22);
    }
    .login-card .form-control:focus {
      background: rgba(255,255,255,0.1);
      border-color: rgba(99,102,241,0.8);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
      color: white;
      outline: none;
    }

    /* Alerts dark */
    .login-card .alert-danger {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 9px;
      font-size: 13px;
    }
    .login-card .alert-success {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
      border-radius: 9px;
      font-size: 13px;
    }

    /* Botão entrar */
    .login-card .btn-primary-custom {
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      letter-spacing: 0.2px;
      margin-top: 4px;
    }

    /* Divisor sutil acima do botão */
    .login-submit-wrap {
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin-top: 20px;
    }

    /* Fade-in do card */
    .login-card {
      animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- Orbs decorativos -->
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
    <div class="login-orb login-orb-3"></div>

    <div class="card login-card p-4" style="width:100%;max-width:420px;position:relative;z-index:1;">

      <div class="login-logo mb-1">
        MV<span class="logo-dot"></span>Tech
      </div>
      <div class="login-subtitle text-center mb-4">Sistema Gerenciador de Tarefas Online</div>

      <ul class="nav nav-tabs mb-4" id="authTabs">
        <li class="nav-item w-50 text-center">
          <a class="nav-link active" id="tab-login" href="#" onclick="showTab('login')">Entrar</a>
        </li>
        <li class="nav-item w-50 text-center">
          <a class="nav-link" id="tab-register" href="#" onclick="showTab('register')">Cadastrar</a>
        </li>
      </ul>

      <!-- Login -->
      <div id="form-login">
        <div id="login-error" class="alert alert-danger d-none mb-3"></div>
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" id="login-email" class="form-control" placeholder="seu@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••">
        </div>
        <div class="login-submit-wrap">
          <button class="btn btn-primary-custom w-100" onclick="doLogin()">Entrar</button>
        </div>
      </div>

      <!-- Register -->
      <div id="form-register" class="d-none">
        <div id="register-error" class="alert alert-danger d-none mb-3"></div>
        <div id="register-success" class="alert alert-success d-none mb-3"></div>
        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Seu nome">
        </div>
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="login-submit-wrap">
          <button class="btn btn-primary-custom w-100" onclick="doRegister()">Criar conta</button>
        </div>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if (getCurrentUser()) window.location.href = 'dashboard.html';

    function showTab(tab) {
      document.getElementById('form-login').classList.toggle('d-none', tab !== 'login');
      document.getElementById('form-register').classList.toggle('d-none', tab !== 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      err.classList.add('d-none');

      if (!email || !password) { showError(err, 'Preencha todos os campos.'); return; }

      const result = login(email, password);
      if (result.ok) {
        window.location.href = 'dashboard.html';
      } else {
        showError(err, result.msg);
      }
    }

    function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const err = document.getElementById('register-error');
      const suc = document.getElementById('register-success');
      err.classList.add('d-none');

      if (!name || !email || !password) { showError(err, 'Preencha todos os campos.'); return; }
      if (password.length < 6) { showError(err, 'Senha deve ter no mínimo 6 caracteres.'); return; }

      const result = register(name, email, password);
      if (result.ok) {
        suc.textContent = 'Conta criada! Fazendo login...';
        suc.classList.remove('d-none');
        setTimeout(() => showTab('login'), 1200);
      } else {
        showError(err, result.msg);
      }
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.remove('d-none');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const activeTab = document.getElementById('form-login').classList.contains('d-none') ? 'register' : 'login';
        activeTab === 'login' ? doLogin() : doRegister();
      }
    });
  </script>
</body>
</html>
