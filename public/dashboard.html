<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MV Tech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
</head>
<body>
  <nav class="navbar px-4">
    <a href="dashboard.html" class="navbar-brand fw-bold">MV<span class="brand-sep"></span><span>Tech</span></a>
    <div class="d-flex align-items-center gap-3">
      <a href="calendario.html" class="btn btn-outline-secondary btn-sm">Calendário</a>
      <span id="user-name" class="text-muted small"></span>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Sair</button>
    </div>
  </nav>

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="page-header">
        <div class="page-header-eyebrow">workspace</div>
        <h1 class="page-title">Meus Projetos<span class="page-title-accent"></span></h1>
      </div>
      <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#modalProjeto">
        + Novo Projeto
      </button>
    </div>

    <div id="projects-container" class="row g-3"></div>
  </div>

  <!-- Modal Novo Projeto -->
  <div class="modal fade" id="modalProjeto" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Novo Projeto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nome do Projeto</label>
            <input type="text" id="proj-name" class="form-control" placeholder="Ex: Site institucional">
          </div>
          <div class="mb-3">
            <label class="form-label">Prazo</label>
            <div class="d-flex gap-2 align-items-center">
              <input type="text" id="proj-deadline" class="form-control" placeholder="Selecione a data" readonly>
              <button type="button" class="deadline-clear-btn" onclick="projDeadlinePicker.clear()" title="Limpar data">✕</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Membros <span class="text-muted small">(separados por vírgula)</span></label>
            <input type="text" id="proj-members" class="form-control" placeholder="Ex: João, Maria, Carlos">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary-custom" onclick="saveProject()">Criar Projeto</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Editar Projeto -->
  <div class="modal fade" id="modalEditProjeto" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Editar Projeto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-proj-id">
          <div class="mb-3">
            <label class="form-label">Nome do Projeto</label>
            <input type="text" id="edit-proj-name" class="form-control" placeholder="Ex: Site institucional">
          </div>
          <div class="mb-3">
            <label class="form-label">Prazo</label>
            <div class="d-flex gap-2 align-items-center">
              <input type="text" id="edit-proj-deadline" class="form-control" placeholder="Selecione a data" readonly>
              <button type="button" class="deadline-clear-btn" onclick="editProjDeadlinePicker.clear()" title="Limpar data">✕</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Membros <span class="text-muted small">(separados por vírgula)</span></label>
            <input type="text" id="edit-proj-members" class="form-control" placeholder="Ex: João, Maria, Carlos">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary-custom" onclick="saveEditProject()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="js/app.js"></script>
  <script>
    requireAuth();

    const projDeadlinePicker = flatpickr('#proj-deadline', {
      locale: 'pt',
      dateFormat: 'Y-m-d',
      altInput: true,
      altFormat: 'd/m/Y',
      allowInput: false,
      disableMobile: true,
    });

    const editProjDeadlinePicker = flatpickr('#edit-proj-deadline', {
      locale: 'pt',
      dateFormat: 'Y-m-d',
      altInput: true,
      altFormat: 'd/m/Y',
      allowInput: false,
      disableMobile: true,
    });

    const user = getCurrentUser();
    document.getElementById('user-name').textContent = user.name;

    function renderProjects() {
      const container = document.getElementById('projects-container');
      const projects = getProjects().filter(p => p.userId === user.id);

      if (projects.length === 0) {
        container.innerHTML = `
          <div class="col-12 empty-state">
            <i>📋</i>
            <p>Nenhum projeto ainda. Crie seu primeiro projeto!</p>
          </div>`;
        return;
      }

      container.innerHTML = projects.map(p => {
        const tasks = getTasks().filter(t => t.projectId === p.id);
        const done = tasks.filter(t => t.status === 'done').length;
        const total = tasks.length;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        const overdue = tasks.filter(t => {
          const today = new Date().toISOString().slice(0,10);
          return t.deadline && t.deadline < today && t.status !== 'done';
        }).length;
        const totalHours = tasks.reduce((sum, t) => sum + (parseFloat(t.estimatedHours) || 0), 0);
        const deadline = p.deadline ? new Date(p.deadline + 'T00:00:00').toLocaleDateString('pt-BR') : 'Sem prazo';
        const members = p.members || 'Sem membros';
        const pctColor = pct === 100 ? '#4ade80' : pct >= 50 ? '#818cf8' : '#fbbf24';

        return `
          <div class="col-md-4">
            <div class="card project-card" onclick="openProject('${p.id}')">
              <div class="card-header">${p.name}</div>
              <div class="card-body">
                <p class="text-muted small mb-1">📅 Prazo: ${deadline}</p>
                <p class="text-muted small mb-1">👥 ${members}</p>
                ${totalHours > 0 ? `<p class="text-muted small mb-1">⏱ ${totalHours}h estimadas</p>` : ''}
                ${overdue > 0 ? `<p class="mb-2" style="color:#fca5a5;font-size:12px">⚠ ${overdue} tarefa${overdue > 1 ? 's' : ''} atrasada${overdue > 1 ? 's' : ''}</p>` : ''}

                <div class="project-progress-wrap mb-3">
                  <div class="d-flex justify-content-between mb-1">
                    <span style="font-size:11px;color:rgba(255,255,255,0.45)">${done}/${total} concluídas</span>
                    <span style="font-size:11px;font-weight:700;color:${pctColor}">${pct}%</span>
                  </div>
                  <div class="project-progress-bar">
                    <div class="project-progress-fill" style="width:${pct}%;background:${pctColor}"></div>
                  </div>
                </div>

                <div class="d-flex justify-content-between">
                  <button class="btn btn-primary-custom btn-sm" onclick="event.stopPropagation(); openProject('${p.id}')">
                    Abrir Kanban
                  </button>
                  <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="event.stopPropagation(); openEditProject('${p.id}')">
                      Editar
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="event.stopPropagation(); removeProject('${p.id}')">
                      Excluir
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function saveProject() {
      const name = document.getElementById('proj-name').value.trim();
      const deadline = document.getElementById('proj-deadline').value;
      const members = document.getElementById('proj-members').value.trim();

      if (!name) { alert('Informe o nome do projeto.'); return; }

      createProject(name, deadline, members);

      document.getElementById('proj-name').value = '';
      projDeadlinePicker.clear();
      document.getElementById('proj-members').value = '';

      bootstrap.Modal.getInstance(document.getElementById('modalProjeto')).hide();
      renderProjects();
    }

    function openProject(id) {
      window.location.href = `kanban.html?project=${id}`;
    }

    const editModal = new bootstrap.Modal(document.getElementById('modalEditProjeto'));

    function openEditProject(id) {
      const p = getProjects().find(p => p.id === id);
      if (!p) return;
      document.getElementById('edit-proj-id').value = p.id;
      document.getElementById('edit-proj-name').value = p.name;
      editProjDeadlinePicker.setDate(p.deadline || null, false);
      document.getElementById('edit-proj-members').value = p.members || '';
      editModal.show();
    }

    function saveEditProject() {
      const id = document.getElementById('edit-proj-id').value;
      const name = document.getElementById('edit-proj-name').value.trim();
      if (!name) { alert('Informe o nome do projeto.'); return; }
      updateProject(id, {
        name,
        deadline: document.getElementById('edit-proj-deadline').value,
        members: document.getElementById('edit-proj-members').value.trim()
      });
      editModal.hide();
      renderProjects();
    }

    function removeProject(id) {
      if (confirm('Excluir este projeto e todas as suas tarefas?')) {
        deleteProject(id);
        renderProjects();
      }
    }

    renderProjects();
  </script>
</body>
</html>
